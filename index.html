<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌱 Plant Disease Detector - AI Powered</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="leaf leaf-1">🌿</div>
        <div class="leaf leaf-2">🌱</div>
        <div class="leaf leaf-3">🌾</div>
        <div class="leaf leaf-4">🌻</div>
        <div class="leaf leaf-5">🌳</div>
        <div class="leaf leaf-6">🍃</div>
        <div class="leaf leaf-7">🌺</div>
        <div class="leaf leaf-8">🌿</div>
    </div>

    <div id="app">
        <header>
            <h1>🌱 Plant Disease Detector</h1>
            <p>AI-powered plant health analysis using PlantVillage dataset</p>
        </header>

        <div class="tab-buttons">
            <button id="cameraTabBtn" class="active">📸 Take Photo</button>
            <button id="uploadTabBtn">📁 Upload Image</button>
        </div>

        <div class="content">
            <!-- Camera Tab -->
            <div id="cameraTab" class="tab-content">
                <div class="camera-container">
                    <video id="video" autoplay playsinline></video>
                    <button id="captureBtn" class="capture-btn">📸 Capture</button>
                </div>
            </div>

            <!-- Upload Tab -->
            <div id="uploadTab" class="tab-content" style="display: none;">
                <div class="upload-container">
                    <label for="fileInput">📁 Choose Image</label>
                    <input type="file" id="fileInput" accept="image/*">
                    <div id="imagePreview"></div>
                </div>
            </div>
        </div>

        <div id="loading" class="loading" style="display: none;">🔍 Analyzing your plant...</div>

        <div id="resultContainer" class="result-container">
            <!-- Results will be dynamically inserted here -->
        </div>
    </div>

    <!-- Include TensorFlow.js -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <script src="script.js"></script>
</body>
</html>
